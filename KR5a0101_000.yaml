front:
  text: 太上升玄說消災護命妙經注收八
  hash: sha256:9a0c7b20411d928df9fe2d82c4a2a99b866d18f5ab50578edbc68e66c06e7ef7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0101_HFL_000-001a, image: hfl/0050/0050-148.png}
body:
  text: 修江混然子注太者無也上者極也升髙也玄妙也說開化也消滅也災害也護保也命身也妙玄之又玄也經心也徑也人人共行之徑路也天尊言無極大道化生天地萬物之多無物不有其妙唯人得其秀而最靈然雖靈也人生風土不同禀受則有殊異是有賢愚不等故天尊以慈憫力開方便門普化世人明本來之真性全見有之身命以心鍊念以情歸性然默運天機流精化氣㑹於乾宫充周四體乃謂之升玄運符火以鍊神咽金液以鍊形形强神清諸邪不入百病不生長生久視超塵出劫乃謂之消災護命若有能受持此道運行一身與聖仙並駕與天地同軀是為妙經也道德經謂善人不善人之師不善人善人之資故無棄人所以衆生雖是有貪愛之心其中皆有善智之性天尊說此經開化妙理以喻後之來者流通讀誦究竟大道之由悟之者愚可以智濁可以清超凡入聖自然消災滅罪保命乃得延年豈不是妙經也哉頌曰無極玄元始巍巍靈寶尊升玄弘教化顯道說經文爾時元始天尊在七寶林中五明宫內爾時者昔混沌之時也元始者祖氣也天尊者一靈至貴天上地下唯此獨尊也七寶林者心也神也五明宫者黃庭也以世法釋當龍漢之初八角垂芒一㸃祖劫之氣化正氣萬道浮滿空中結成聖體一神含妙萬有乃强名曰元始天尊也當說之時在始青天七寶林中五明宫內也以道用言人人之生皆有元始天尊此言一㸃真陽之氣居於生門密户中間空懸一竅乃曰天心性亦寓焉為萬神朝㑹之祖是謂元始天尊者也凡遇一陽初動當轉經之時則神下墜玄關鼓巽風吹發離宫三昧之火追二氣於黃道㑹三性於元宫混融成丹所以鍊性如金之堅全藉火力以煆鍊火以七言土以五言是以在七寶林中五明宫內者也此即度人經所謂元始懸一寶珠大如黍米在空玄之中去地五丈登引天真之道也頌曰元始先天地無為浩劫宗一心抱衆體真下玩真空與無極聖衆俱放無極光明照無極世界此承上言一神正位萬神朝宗以世法言當天尊說經之時則諸天諸地三界十方無極聖衆一時同㑹於七寶林中五明宫內咸聽說經之妙是時放無極光明照無極世界也以道用言凡作丹之時以天罡之斡運逆回斗柄之機則通身萬神萬氣同㑹於心薰蒸片餉即得神清氣爽心廣體胖靈含空妙萬竅光明是照無極世界也此即與度人經所言上聖髙尊妙行真人無鞅數衆淨空而來俱入寶珠之內既入珠口不知所在法事粗悉諸天復位倏歘之間寂無遺響是也頌曰一黍藏天地諸真集聖軀慧光生恍惚遍界照虛無觀無極衆生受無極苦惱宛轉世間輪廽生死漂浪愛河流吹欲海沉滯聲色迷惑有無觀者洞觀也無極者言天下人物之多生生不盡之意也衆生者下愚貪愛之人也及其一切含靈之物皆是衆生此一節以下天尊居靜極之中以智慧目洞觀大之內劫濁之間有等貪夫俗子下愚之人不畏天命不惜生身紛紛貪愛形雖人身心如禽獸也奈何此等衆生不識人倫不懼國法心為形役逐利迷情舍死貪求了無厭足造成種種之愆作下無遮罪業一旦自招殃咎天災罪己小則自陷一身大則禍連骨肉是以受無極苦惱宛轉世間輪回生死於六道之中永無出期漂浪於愛河流浪於欲海之地汩沒沉淪無有休息天尊憐憫衆生之苦深可痛哉故以此等由開化世人早悟回頭殊不知造惡者必有惡報如影隨形竟不尋思至此唯務縱念所為沉滯於聲色耳中聽眼中見紛紜馳逐於外自身精神耗散化為異類而不復猶自不醒迷惑有無而終不攺也頌曰衆生心自昧造業受輪沉愛滯於聲色何如獸與禽無空有空無色有色無無有無有有無有終始暗昧不能自明畢竟迷惑此一節承上言衆生迷惑有無不自醒悟於此故言大道之始本無形無情無名因氣化生物一分為二遂有形有情有名衆生所以不得真道者執著幻形為有昧了本來之性道本不空執著為空道本無色執著有色道本無形執著有形道虛真有執著無有以此為有妄心不信真道不知其來不知其去是以終始暗昧不能自明畢竟迷惑故造惡作非遭於濁辱受報無休永失真道也頌曰大道本無色真空非是空若人明得透顯出舊家風天尊告曰爾等衆生從不有中有不無中無不色中色不空中空非有為有非無為無非色為色非空為空空即是空空無定空色即是色色無定色即色是空即空是色空者道虛無體也色者一切有形之物也此一節以下天尊慈憫世人不悟真道於此丁寧反覆告戒形容道之體用教人如此悟見大道至虛無體因不虛立故生形以立道形為道之室道為形之用是以有其形必有其神必有其道人之元神本是虛靈因形所梏障礙不靈譬如空中有日千江同色水清月明水濁月昏月不離水水不離月形不離神神不離形形有敗壞神無生滅人生不過假此幻形以成於道何故衆生如此之愚執此幻形被他所使棄其本逐其末終不悟性命之理天尊故言爾等衆生可以諦聽吾說從不有中有者此言形非長有不可認形為有不無中無此言人性虛靈亘古亘今不生不滅不可以性為無也不色中色者此言大道清虛本無其色不貪迷其色也不空中空者此言人神含妙主宰萬機本無其空不可固執為空也非有為有者此言人初生為赤子之時本來素儉非有今日不可貪生厚利為我之有也非無為無者此言人物之生一身一竅一物一太極造化妙理無不在人一身不可棄我之有而為無者也非色為色者此言大道沖虛無物不貫天地神明無處不存本無形色之可覩不可執其非色而為色者也非空為空者此言成道之人變化自在劫劫長存本來非空而實有不可執著為虛無而笑之為空也空即是空空無定空者此言大道無形變化莫測生天生地生人物豈有定空之理至如青天白日一時風雲雷雨變化頃刻遍滿大千世界是也知人性靜之時乃太空也一時發其喜怒神機不測亦復如是豈不是空無定空者也色即是色色無定色者人以眼觀色眼即色也若能覺之得色觀色回光返照了徹心空色皆無也且夫天地之間隂陽化生萬物隨氣成質隨質變色有情而變無情貞女化為石山蚯化百合之類無情而變有情丹楓化羽人腐草化為螢之類萬物皆化輪回無期豈不是色無定色者也是以即色是空即空是色豈不聞金剛經云無我相人相衆生相壽者相凡有所相即是虛妄若是諸相非相即見如來斯言至矣學人於此玩味其庶幾乎頌曰道妙非空法人迷幻色心有無都放下陸地盡平沉喝㑹得麼行到水窮山盡處鳥啼花笑一般春若能知空不空知色不色名為照了始達妙音識無空法洞觀無礙入衆妙門自然解悟離諸疑網不著空見此一節承上文而言為化衆生其有能悟之者不墮頑空不著邪見唯存一心湛然常寂了了真空無所不知無所不透道在我而不在於彼若領悟至此地位方信知空不空知色不色是以名為照了始達妙音識無空法洞觀自在此心通於他心無物不盡其性穿山透石無有隔礙於我慧性生明廣照無際所以入衆妙門自然解悟頭頭是道物物同真一切疑網盡行掀翻獨露本來不著空見也頌曰空空本不空色色即非色直下悟玄機知白守其黑清靜六根斷除邪障清靜者虛心實腹也六根者眼耳鼻舌身意也斷絶也除去也邪障一切塵勞色欲也此承上言不著空見之意於此教人清靜其六根絶去其邪障內不出外不入自然神清氣靜六根安寧邪障斷除矣頌曰了徹一心通天徹地陽威隂消邪魔退位我即為爾說是妙經名曰護命濟度衆生傳教世間流通讀誦我者天尊自稱也爾者言悟道之人也說開化也妙玄也經心也猶路也人人共行之路也濟者接引之意也度者超彼岸也此一節天尊故言世人若能悟道明徹不被形縛不著邪障所蔽透得向上機關至此田地方才可與爾言說大道之宗轉經之妙這誦經之者可以通神悟之者可以養命得之者可以長年是名曰護命濟度衆生傳數世間使人人流通讀誦願得箇箇早悟圓成豈不稱天尊之心哉頌曰箇箇身同道人人心是經精凝神氣固護命保長生即有飛天神王破邪金剛護法靈童救苦真人金精猛獸各百億萬衆俱侍衛是經此章以世法言凡好道持誦是經之人當依經說有如是神童猛獸侍衛誦經者身以道用言飛天神王者意轉靈寶升玄之道也破邪金剛者武鍊也護法靈童者文烹也救苦真人者退魔也復其天心也金精猛獸者五色師子也總而言之凡行靈寶之時則當轉護命之經命吾黃意入東海鞭起潜龍駕火輿上升玄谷之宫乃曰飛天神王倒流黃河之水作他崑崙蕩氛之霖乃曰破邪金剛從西山跨白虎以歸家乃曰護法靈童戰退强魔元神復位乃曰救苦真人身坐空玄五色師子之上凛然肅正其威儀乃曰金精猛獸通身萬神萬氣悉歸一心乃曰各百億萬衆俱侍衛是經也學人能悟此妙內有默運綿綿如是之功外則自有十天善神長擁護其人斯經玄妙不可思議功德也哉頌曰一㸃無多子超凡入聖基道髙魔自伏神妙頭威儀隨所供養捍厄扶衰度一切衆生離諸染著此言有道誦經之人隨身所至自有神明擁護供養外則攝伏羣魔內則通真顯聖一切含靈皆沾道廕有情無情咸登彼岸所以捍其厄而扶其衰度一切衆生離諸染著也頌曰道妙無窮神化莫測救度衆生扶衰捍厄爾時天尊即說偈曰視不見我聽不得聞離種種邊名為妙道此天尊說經已畢不敢自讚故尊稱爾時天尊即說偈言形容大道之妙總結此經一篇之玄此四句偈為學人喫緊處老子所謂視之不見名曰夷聽之不聞名曰希摶之不得名曰微所以道在天地天地不知道在萬物萬物不知澄之不清撓之不濁動中不動靜中不靜妙體至虛靈應萬有不可得而形容也可以離形棄智即此用不見中親見見中不見不聞中親聞聞中不聞默識心通神領意㑹到此之間自離種種諸相方名為妙道也豈不為學人希有之功者乎頌曰大象無形大音希聲虛空粉碎神升太清太上升玄說消災護命妙經注
