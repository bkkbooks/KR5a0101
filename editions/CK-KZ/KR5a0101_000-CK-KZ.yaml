front:
  text: 太上昇玄說消災護命妙經註
  hash: sha256:f9a7ce68602b912bd64bd35bfa68dd5061b91d656a9c644beb9c456aa41cf26c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0101_CK-KZ_01p044a, image: JY010/CK-KZ_JY010_01p044a.png}
body:
  text: 脩江混然子註太者無也上者極也昇高也玄妙也說開化也消滅也災害也護保也命身也妙玄之又玄也經心也徑也人人共行之徑路也天尊言無極大道化生天地萬物之多無物不有其妙惟人得其秀而最靈然雖靈也人生風土不同禀受則有殊異是有賢愚不等故天尊以慈憫力開方便門普化世人明本來之眞性全現有之身命以心鍊念以情歸性然默運天機流精化氣會於乾宮充周四體乃謂之昇玄運符火以鍊神嚥金液以鍊形形强神淸諸邪不入百病不生長生久視超塵出劫乃謂之消災護命若有能受持此道運行一身與聖仙並駕與天地同軀是爲妙經也道德經謂善人不善人之師不善人善人之資故無棄人所以眾生雖是有貪愛之心其中皆有善智之性天尊說此經開化妙理以喻後之來者流通讀誦究竟大道之由悟之者愚可以智濁可以淸超凡入聖自然消災滅罪保命乃得延年豈不是妙經也哉頌曰無極玄元始巍巍靈寶尊昇玄弘教化顯道說經文爾時元始天尊在七寶林中五明宫内爾時者昔混沌之時也元始者祖氣也天尊者一靈至貴天上地下惟此獨尊也七寶林者心也神也五明宮者黃庭也以世法釋當龍漢之初八角垂芒一點祖劫之氣化正氣萬道浮滿空中結成聖體一神含妙萬有乃强名曰元始天尊也當說經之時在始靑天七寶林中五明宮内也以道用言人人之生皆有元始天尊此言一點眞陽之氣居於生門密戸中間空懸一竅乃曰天心性亦寓焉爲萬神朝會之祖是謂元始天尊者也凡遇一陽初動當轉經之時則神下墜玄關鼓巽風吹發離宮三昧之火追二氣於黃道會三性於元宮混融成丹所以鍊性如金之堅全藉火力以鍛鍊火以七言土以五言是以在七寶林中五明宮内者也此卽度人經所謂元始懸一寶珠大如黍米在空玄之中去地五丈登引天眞之道也頌曰元始先天地無爲浩劫宗一心抱眾體眞下翫眞空與無極聖眾俱放無極光明照無極世界此承上言一神正位萬神朝宗以世法言當天尊說經之時則諸天諸地三界十方無極聖眾一時同會於七寶林中五明宮内咸聽說經之妙是時放無極光明照無極世界也以道用言凡作丹之時以天罡之斡運逆迴斗柄之機則通身萬神萬氣同會于心薰蒸片餉卽得神淸氣爽心廣體胖靈含空妙萬竅光明是照無極世界也此卽與度人經所言上聖高尊妙行眞人無鞅數眾浮空而來俱入寶珠之内旣入珠口不知所在法事粗悉諸天復位倐歘之間寂無遺響是也頌曰一黍藏天地諸眞集聖軀慧光生恍惚徧界照虛無觀無極眾生受無極苦惱宛轉世間輪迴生死漂浪愛河流吹慾海沉滯聲色迷惑有無觀者洞觀也無極者言天下人物之多生生不盡之意也眾生者下愚貪愛之人也及其一切含靈之物皆是眾生此一節以下天尊居靜極之中以智慧目洞觀大化之内劫濁之間有等貪夫俗子下愚之人不畏天命不惜生身紛紛貪愛形雖人身心如禽獸也奈何此等眾生不識人倫不懼國法心爲形役逐愛迷情舍死貪求了無厭足造成種種之愆作下無邊罪業一旦自招殃咎天災罪已小則自陷一身大則禍連骨肉是以受無極苦惱宛轉世間輪迴生死於六道之中永無出期漂浪於愛河流吹於慾海之地汨沒沉淪無有休息天尊憐憫眾生之苦深可痛哉故以此等由開化世人早悟囘頭殊不知造惡者必有惡報如影隨形竟不尋思至此惟務縱念所爲沉滯於聲色耳中聽眼中見紛紜馳逐於外自身精神耗散化爲異類而不復猶自不醒迷惑有無而終不攺也頌曰眾生心自昧造業受淪沉愛滯於聲色何如獸與禽無空有空無色有色無無有無有有無有終始暗昧不能自明畢竟迷惑此一節承上言眾生迷惑有無不自省悟於此故言大道之始本無形無情無名因氣化生物一分爲二遂有形有情有名眾生所以不得眞道者執著幻形爲有昧了本來之性道本不空執著爲空道本無色執著有色道本無形執着有形道虛眞有執著無有以此爲有妄心不信眞道不知其來不知其去是以終始暗昧不能自明畢竟迷惑故造惡作非遭於濁辱受報無休永失眞道也頌曰大道本無色眞空非是空若人明得透顯出舊家風天尊吿曰爾等眾生從不有中有不無中無不色中色不空中空非有爲有非無爲無非色爲色非空爲空空卽是空空無定空色卽是色色無定色卽色是空卽空是色空者道虛無體也色者一切有形之物也此一節以下天尊慈憫世人不悟眞道於此丁寕反覆告戒形容道之體用教人如此悟見大道至虛無體因不虛立故生形以立道形爲道之室道爲形之用是以有其形必有其神必有其道人之元神本是虛靈因形所梏障礙不靈譬如空中有月千江同色水淸月明水濁月昏月不離水水不離月形不離神神不離形形有敗壞神無生滅人生不過假此幻形以成於道何故眾生如此之愚執此幻形被他所使棄其本逐其末終不悟性命之理天尊故言爾等眾生可以諦聽吾說從不有中有者此言形非長有不可認形爲有不無中無此言人性虛靈亘古亘今不生不滅不可以性爲無也不色中色者此言大道淸虛本無其色不貪迷其色也不空中空者此言人神含妙主宰萬機本無其空不可固執爲空也非有爲有者此言人初生爲赤子之時本來素儉非有今日不可貪生厚利爲我之有也非無爲無者此言人物之生一身一竅一物一太極造化妙理無不在人一身不可棄我之有而爲無者也非色爲色者此言大道沖虛無物不貫天地神明無處不在本無形色之可覩不可執其非色而爲色者也非空爲空者此言成道之人變化自在劫劫長存本來非空而實有不可執着爲虛無而笑之爲空也空卽是空空無定空者此言大道無形變化莫測生天生地生人物豈有定空之理至如靑天白日一時風雲雷雨變化頃刻徧滿大千世界是也如人性靜之時乃太空也一時發其喜怒神機不測亦復如是豈不是空無定空者也色卽是色色無定色者人以眼不色眼卽色也若能覺之得色觀色迴光返照了徹心空色皆無也且夫天地之間陰陽化生萬物隨氣成質隨質不色有情而變無情貞女化爲石山蚯化百合之類無情而變有情丹楓化羽人腐草化爲螢之類萬物皆化輪迴無期豈不是色無定色者也是以卽色是空卽空是色豈不聞金剛經云無我相人相眾生相夀者相凡有所相卽是虛妄若見諸相非相卽見如來斯言至矣學人於此玩味其庶幾乎頌曰道妙非空法人迷幻色心有無都放下陸地盡平沉噫會得麽行到水窮山盡處鳥啼花笑一般春若能知空不空知色不色名爲照了始達妙音識無空法洞觀無礙入眾妙門自然解悟離諸疑網不著空見此一節承上文而言爲化眾生其有能悟之者不墮頑空不着邪見唯存一心湛然常寂了了眞空無所不知無所不透道在我而不在於彼若領悟至此地位方信知空不空知色不色是以名爲照了始達妙音識無空法洞觀自在此心通於他心無物不盡其性穿山透石無有隔礙於我慧性生明廣照無際所以入眾妙門自然解悟頭頭是道物物同眞一切疑網盡行掀翻獨露本來不着空見也頌曰空空本不空色色卽非色直下悟玄機知白守其黑淸靜六根斷除邪障淸靜者虛心實腹也六根者眼耳鼻舌身意也斷絕也除去也邪障一切魔勞色慾也此承上言不着空見之意於此教人淸淨其六根絶去其邪障内不出外不入自然神淸氣靜六根安寕邪障斷除矣頌曰了徹一心通天徹地陽盛陰消邪魔退位我卽爲爾說是妙經名曰護命濟度眾生傳教世間流通讀誦我者天尊自稱也爾者言悟道之人也說開化也妙玄也經心也猶路也人人共行之路也濟者接引之意也度者超彼岸也此一節天尊故言世人若能悟道明徹不被形縛不着邪障所蔽透得向上機關至此田地方纔可與爾言說大道之宗轉經之妙誦之者可以通神悟之者可以養命得之者可以長年是名曰護命濟度濟度眾生傳教世間使人人流通讀誦願得箇箇早悟圓成豈不稱天尊之心哉頌曰箇箇心同道人人心是經精凝神氣固護命保長生卽有飛天神王破邪金剛護法靈童救苦眞人金精猛獸各百億萬眾俱侍衞是經此章以世法言凡好道持誦是經之人當依經說有如是神童猛獸侍衞誦經者身以道用言飛天神王者意轉靈寶昇玄之道也破邪金剛者武鍊也護法靈童者文烹也救苦眞人者退魔也復其天心也金精猛獸者五色獅子也總而言之凡行靈寶之時則當轉護命之經命吾黃童入東海鞭起六龍駕火輿上昇玄谷之宮乃曰飛天神王倒流黃河之水作他崑崙蕩氛之霖乃曰破邪金剛從西山跨白虎以歸家乃曰護法靈童下退强魔元神復位乃曰救苦眞人身坐空玄五色獅子之上凛然肅正其威儀乃曰金精猛獸通身萬神萬氣悉歸一心乃曰各百億萬眾俱侍衞是經也學人能悟此妙内有默運綿綿如是之功外則自有十天善神長擁護其人斯經玄妙不可思議功德也哉頌曰一點無多子超凡入聖基道高魔自伏神妙顯威儀隨所供養捍厄扶衰度一切眾生離諸染著此言有道誦經之人隨身所至自有神明擁護供養外則攝伏羣魔内則通經顯聖一切含靈皆沾道廕有情無情咸登彼岸所以捍其厄而扶其衰度一切眾生離諸染着也頌曰道妙無窮神化莫測救度眾生扶危捍厄爾時天尊卽說偈曰視不見我聽不得聞離種種邊名爲妙道此天尊說經已畢不敢自讚故尊稱爾時天尊卽說偈言形容大道之妙總結此經一篇之玄此四句偈爲學人喫緊處老子所謂視之不見名曰夷聽之不聞名曰希搏之不得名曰微所以道在天地天地不知道在萬物萬物不知澄之不淸撓之不濁動中不動靜中不靜妙體至虛靈應萬有不可得而形容也可以離形棄智卽此用不見中親見見中不見不聞中親聞聞中不聞默識心通神領意會到此之間自離種種諸相方名爲妙道也豈不爲學人希有之功者乎頌曰大象無形大音希聲虛空粉碎神昇太淸
